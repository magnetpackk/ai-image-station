# =============================================================================
# Nginx reverse-proxy configuration for ai-image-station
# =============================================================================
# Server: 124.221.123.90
# Backend: http://127.0.0.1:8080
#
# Place this file at /etc/nginx/sites-available/ai-image-station
# then symlink: ln -s /etc/nginx/sites-available/ai-image-station /etc/nginx/sites-enabled/
# =============================================================================

upstream ai_image_station {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name [REDACTED];

    # ------------------------------------------------------------------
    # Upload limits
    # ------------------------------------------------------------------
    client_max_body_size 20M;

    # ------------------------------------------------------------------
    # Gzip compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ------------------------------------------------------------------
    # Real IP forwarding (if behind another proxy / CDN)
    # ------------------------------------------------------------------
    # set_real_ip_from 10.0.0.0/8;
    # set_real_ip_from 172.16.0.0/12;
    # set_real_ip_from 192.168.0.0/16;
    # real_ip_header X-Forwarded-For;

    # ------------------------------------------------------------------
    # Proxy headers
    # ------------------------------------------------------------------
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ------------------------------------------------------------------
    # Static files — serve directly from Nginx for better performance
    # ------------------------------------------------------------------
    # Optional: if you mount the static assets on the host, uncomment below
    # location /assets/ {
    #     alias /opt/ai-image-station/static/assets/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }
    #
    # location /favicon.svg {
    #     alias /opt/ai-image-station/static/favicon.svg;
    #     expires 7d;
    # }
    #
    # location /icons.svg {
    #     alias /opt/ai-image-station/static/icons.svg;
    #     expires 7d;
    # }

    # ------------------------------------------------------------------
    # Uploaded images — serve directly from Nginx with caching
    # ------------------------------------------------------------------
    # Optional: if /data is accessible on the host, uncomment below
    # location /images/ {
    #     alias /data/images/;
    #     expires 7d;
    #     add_header Cache-Control "public";
    # }

    # ------------------------------------------------------------------
    # Main proxy pass
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://ai_image_station;
        proxy_http_version 1.1;

        # WebSocket support (for future use)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 32k;
    }

    # ------------------------------------------------------------------
    # Deny access to hidden files
    # ------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

